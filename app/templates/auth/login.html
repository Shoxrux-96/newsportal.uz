{% extends "base.html" %}
{% block title %}Kirish — XabarUz{% endblock %}

{% block extra_css %}
<style>
.auth-wrapper {
    min-height: calc(100vh - 200px);
    display: flex; align-items: center; justify-content: center;
    margin: -2rem -1.5rem;
    background: var(--ink);
    position: relative; overflow: hidden;
}
.auth-wrapper::before {
    content: 'XabarUz';
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-size: 18vw; font-weight: 900;
    color: rgba(255,255,255,0.02);
    user-select: none; pointer-events: none;
    white-space: nowrap;
}
.auth-card {
    background: var(--paper);
    width: 100%; max-width: 420px;
    padding: 2.5rem;
    position: relative; z-index: 1;
    border-top: 4px solid var(--accent);
}
.auth-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 900;
    color: var(--ink); text-align: center;
    margin-bottom: 0.25rem;
}
.auth-logo span { color: var(--accent); }
.auth-subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
.form-group { margin-bottom: 1.25rem; }
.form-group label {
    display: block; font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); margin-bottom: 0.5rem;
}
.form-group input {
    width: 100%; padding: 0.75rem 1rem;
    border: 2px solid var(--border); border-radius: 2px;
    background: white; font-size: 0.9rem;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: border-color 0.2s;
    outline: none;
}
.form-group input:focus { border-color: var(--accent); }
.btn-full { width: 100%; padding: 0.85rem; font-size: 0.9rem; }
.auth-footer {
    text-align: center; margin-top: 1.5rem;
    font-size: 0.85rem; color: var(--muted);
    padding-top: 1.5rem; border-top: 1px solid var(--border);
}
.auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">Xabar<span>Uz</span></div>
        <p class="auth-subtitle">Hisobingizga kiring</p>

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email manzili</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Kirish →</button>
        </form>

        <div class="auth-footer">
            Hisobingiz yo'qmi? <a href="/signup">Ro'yxatdan o'ting</a>
        </div>

        <div style="margin-top:1rem; padding:0.85rem; background:rgba(200,57,43,0.08); border:1px solid rgba(200,57,43,0.2); border-radius:2px; font-size:0.75rem; color:var(--muted);">
            <strong>Demo admin:</strong> admin@news.uz / admin123
        </div>
    </div>
</div>
{% endblock %}
